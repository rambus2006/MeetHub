server.servlet.context-path=/api
server.port=8088
spring.application.name=backend
# JWT Settings
jwt.secret=testSecretKeyForJwtTokenGenerationTestSecretKeyForJwtTokenGenerationTestSecretKey
jwt.access-token-validity=300000
jwt.refresh-token-validity=604800000
# MySQL - Use H2 for testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
# Redis - Embedded Redis for testing
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Swagger
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
# App
app.cors-origins=http://localhost:3000
app.swagger-enabled=false
app.max-folder-depth=7